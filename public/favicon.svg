<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F2A52"/>
      <stop offset="100%" stop-color="#0A1F3D"/>
    </linearGradient>
  </defs>
  <!-- Square card with subtle radius (matches the in-app card pattern) -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#g)"/>

  <!-- Coffee bean cradled by an arc.
       The bean is an ellipse with a curved crease; the arc suggests "R" for Ronnoco
       opening toward the right. Accent uses the app's accent color (#D97757-ish
       coffee orange) for the bean center stripe. -->
  <g transform="translate(256 256)">
    <!-- Outer "R" arc (open right) -->
    <path d="M -110 -130
             A 130 130 0 1 1 -110 130"
          fill="none" stroke="#FAFAF7" stroke-width="36" stroke-linecap="round"/>
    <!-- Bean body -->
    <ellipse cx="20" cy="0" rx="78" ry="108"
             fill="#FAFAF7" transform="rotate(18 20 0)"/>
    <!-- Bean crease -->
    <path d="M 20 -88 C -10 -40, -10 40, 20 88"
          stroke="#0A1F3D" stroke-width="14" fill="none" stroke-linecap="round"
          transform="rotate(18 20 0)"/>
    <!-- Accent stripe on the bean (warm, hints at coffee crema) -->
    <path d="M 20 -88 C -10 -40, -10 40, 20 88"
          stroke="#D97757" stroke-width="6" fill="none" stroke-linecap="round"
          transform="rotate(18 20 0)" opacity="0.9"/>
  </g>
</svg>
