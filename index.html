<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ronnoco · Deal Builder</title>

    <!-- v32 PWA meta. The actual web manifest is generated by vite-plugin-pwa
         at build time as /manifest.webmanifest; the link below points to it.
         Browsers use this + the service worker to surface the install prompt
         and render the app icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicons. The SVG is the source of truth for browser tabs.
         icon-192 and icon-512 are PNG fallbacks; apple-touch-icon serves
         iOS Safari's "Add to Home Screen" handling. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS-specific PWA meta: tells Safari to launch full-screen when
         the user opens the icon from their home screen, and matches the
         status bar color to the app navbar (navy-900). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deal Builder" />

    <!-- Address bar tint on Chrome (Android + recent desktop). Matches the
         in-app navy navbar so the chrome doesn't look detached. -->
    <meta name="theme-color" content="#0A1F3D" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
